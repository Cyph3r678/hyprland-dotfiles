# See https://hypr.land
monitor=,preferred,auto,1

# Execute your favorite apps at launch
exec-once = nwg-dock-hyprland
exec-once = waybar
exec-once = hyprpaper
exec-once = awww-daemon
exec-once = bash -c "python3 /home/shaurya/kabegami-h/precache.py &"
exec-once = swaync
#exec-once = hyprpm reload
#exec-once = hyprpm enable hyprbars
exec-once = qs -c QSpanel
#exec-once = qs -c noctalia-shell

# Walker
exec-once = walker --gapplication-service
exec-once = elephant service enable
exec-once = systemctl --user start elephant.service

# Set programs that you use
$terminal = kitty
$fileManager = Nautilus
$menu = rofi -show drun

# Set your main modifier key
$mainMod = SUPER

# Example binds, see https://hypr.land for more
bind = SUPER, 3, exec, ~/gundam.sh
bind = $mainMod, X, exec, ~/cava.sh
bind = SUPER, D, exec, qs -c QSpanel ipc call dock toggle
bind = $mainMod, I, exec, ~/qs.sh
bind = $mainMod, U, exec, ~/nitch.sh
bind = $mainMod, 1, exec, ~/noctalia.sh
bind = $mainMod, 2, exec, ~/waybar.sh
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, xdg-open ~
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, walker
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, H, exec, ~/.config/waybar/launch.sh
bind = $mainMod, Z, exec, ~/.local/bin/zed
bind = $mainMod, W, exec, ~/kabegami-h/launch.sh
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, S, exec, /home/shaurya/.config/swaync/script/launch.sh

bind = SUPER, TAB, exec, qs -c QSpanel ipc call workspaceswitcher toggle

#sliders
binde = SUPER, F3, exec, qs -c QSpanel ipc call osd brightnessDown
binde = SUPER, F4, exec, qs -c QSpanel ipc call osd brightnessUp
binde = SUPERSHIFT, F3, exec, qs -c QSpanel ipc call osd volumeDown
binde = SUPERSHIFT, F4, exec, qs -c QSpanel ipc call osd volumeUp


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, right, workspace, +1
bind = $mainMod, left, workspace, -1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
# ... (up to 9)
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 4
    col.active_border = rgb(0e1116)
    col.inactive_border = rgba(0e1116ff)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 20
}

decoration {
    rounding = 5  # Change 10 to your desired radius in pixels
    shadow {
        enabled = true
        range = 20                # How far the shadow extends (in pixels)
        render_power = 3         # How sharp/dark the shadow is
        color = rgba(00000073)
        offset = 0 0             # Shadow offset (X Y)
    }
    blur {
            enabled = true
    
            size = 2              # blur radius (higher = stronger)
            passes = 3            # number of blur passes (higher = smoother/heavier)
    
            ignore_opacity = true
            new_optimizations = true
    
            noise = 0.0100        # grain/noise amount
            contrast = 1.0        # contrast of blurred background
            brightness = 1.0      # brightness of blurred background
    
            vibrancy = 0.2        # color saturation behind blur
            vibrancy_darkness = 0.0
        }
    }

animations {
    enabled = yes

    # Main workspace animation (vertical slide)
    animation = workspaces, 1, 4, default, slidevert

    # Recommended: also set the in/out variants for consistency
    animation = workspacesIn, 1, 4, default, slidevert
    animation = workspacesOut, 1, 4, default, slidevert
}

plugin {
    hyprbars {
        # example config
        bar_height = 40
        bar_padding = 18
        bar_button_padding = 8
        bar_color = rgb(191919)
        bar_blur = true
        bar_text_font = Modulus Pro Semi Bold
        bar_text_size = 15  

        col.text = rgb(e8e8e8)

        # example buttons (R -> L)
    
        hyprbars-button = rgb(fa456c), 15, , hyprctl dispatch killactive
        hyprbars-button = rgb(7769fa), 12.5, , hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(4a4a4a), 10, , ~/minimize.sh
        # cmd to run on double click of the bar
        on_double_click = hyprctl dispatch fullscreen 1
    }
   dynamic-cursors {
           # Enable the mode you prefer (stretch, rotate, tilt, or none)
           mode = stretch 
           
           # Enable shake-to-find ripple/magnify effects
           shake {
               enabled = true
               mode = stretch # or "shrink", "enlarge", etc.
           }
           
           # Adjust how long the effect lasts or its bounce intensity
           hyprcursor {
               enabled = true
           }
       }
}



windowrule = opacity 1 1, match:class kitty

#layerrule = no_screen_share on, match:namespace qspanel:workspaceswitcher

layerrule = blur on, match:namespace quickshell:powermenu
layerrule = blur on, ignore_alpha 0.2, match:namespace qspanel:workspaceswitcher



# Screenshot active window
bind = $mainMod, Print, exec, hyprshot -m window
# Screenshot entire output/monitor
bind = , Print, exec, hyprshot -m output
# Screenshot a selected region
bind = $mainMod SHIFT, Print, exec, hyprshot -m region
