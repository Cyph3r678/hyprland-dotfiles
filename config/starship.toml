format="$directory$git_branch$character"

# Prompt symbols 
[character]
success_symbol = "[🞈](#a6e3a1 bold)"
error_symbol = "[🞈](#f38ba8)"
vicmd_symbol = "[🞈](#f9e2af)"

[directory]
format = "[]($style)[(bg:#7769fa fg:#49628a)$path](bg:#7769fa fg:#e8e8e8)[ ]($style)"
style = "bg:#0000 fg:#7769fa"
                                                                                                                
[git_branch]
format = "[]($style)[[> ](bg:#7769fa fg:#e8e8e8 bold)$branch](bg:#7769fa fg:#e8e8e8)[ ]($style)"
style = "bg:#0000 fg:#7769fa"
